name: release

# `v*` 태그 push 시 4 OS/arch 바이너리 빌드 + GitHub Release + x-mesh/homebrew-tap
# Formula 갱신까지 처리한다.
#
# **왜 GoReleaser가 아니라 커스텀 스크립트인가**: aic는 Rust + sysinfo(IOKit/CoreFoundation)·
# keyring(Security)이라 darwin 빌드가 macOS 프레임워크를 C 링커로 링크해야 한다. GoReleaser
# rust builder는 tool과 무관하게 항상 cargo-zigbuild(zig 링커)를 쓰는데, zig는 SDKROOT·
# `-L framework=` search path를 줘도 macOS 프레임워크를 못 링크해 v0.27.0부터 5번 실패했다
# (undefined symbol: _SecKeychain*/_IOBSDNameMatching). prebuilt builder는 GoReleaser Pro
# 전용이라 OSS로 불가. 검증된 유일한 길은 native cargo build(Apple ld가 프레임워크 링크)라,
# GoReleaser를 걷어내고 macos runner에서 직접 빌드·아카이브·릴리스·Formula 갱신을 한다.
# (x-mesh/gk는 Go(CGO off) 순수 크로스컴파일이라 이 문제가 없어 GoReleaser로 충분하다 —
# 언어가 달라 aic엔 그 패턴을 못 쓴다.)
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # GitHub Release 생성

jobs:
  release:
    # darwin native 빌드에 필수 — Apple SDK/ld가 있는 runner라야 프레임워크가 링크된다.
    # linux 두 target은 같은 runner에서 cargo-zigbuild로 cross-compile한다.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # tag 메타데이터 + 전체 git log

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      # zig + cargo-zigbuild — linux 두 target 전용(darwin은 native cargo).
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild --version 0.20.1 || cargo install --locked cargo-zigbuild

      # 4 triple × 3 binary 빌드 → (os,arch)별 tar.gz + checksums.
      #   linux는 cargo zigbuild(zig cross), darwin은 cargo build(native, Apple ld=framework 링크).
      #   feature/package 인자는 이전 .goreleaser.yaml의 flags와 동일(phase-3_4 릴리스 빌드).
      - name: Build, archive, checksum
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          mkdir -p dist

          build() {  # $1=triple  $2=os  $3=arch  $4=tool(zig|native)
            local triple="$1" os="$2" arch="$3" tool="$4"
            if [ "$tool" = "zig" ]; then
              cargo zigbuild --release --target "$triple" --no-default-features --features phase-3_4 \
                -p aic-client --bin aic \
                -p aic-server --bin aic-session --bin aicd
            else
              cargo build --release --target "$triple" --no-default-features --features phase-3_4 \
                -p aic-client --bin aic \
                -p aic-server --bin aic-session --bin aicd
            fi
            local stage="stage/${os}_${arch}"
            mkdir -p "$stage"
            cp "target/${triple}/release/aic" \
               "target/${triple}/release/aic-session" \
               "target/${triple}/release/aicd" \
               "$stage/"
            cp LICENSE* README.md CHANGELOG.md "$stage/" 2>/dev/null || true
            tar -C "$stage" -czf "dist/aic_${VERSION}_${os}_${arch}.tar.gz" .
          }

          build x86_64-unknown-linux-gnu  linux  amd64  zig
          build aarch64-unknown-linux-gnu linux  arm64  zig
          build x86_64-apple-darwin       darwin amd64  native
          build aarch64-apple-darwin      darwin arm64  native

          ( cd dist && shasum -a 256 *.tar.gz > checksums.txt )
          ls -la dist

      # GitHub Release — mode:replace 멱등(재실행 시 기존 asset 덮어쓰기).
      - name: Create/refresh GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "$TAG" dist/*.tar.gz dist/checksums.txt \
              --title "$TAG" --notes-from-tag
          fi

      # x-mesh/homebrew-tap Formula 갱신 — GoReleaser brews가 하던 것을 재현.
      #   os/arch별 sha256을 checksums에서 뽑아 기존 Formula 형식(on_macos/on_linux ×
      #   intel/arm, url+sha256+install)을 그대로 재생성 후 push한다.
      - name: Update Homebrew tap Formula
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          base="https://github.com/x-mesh/aic/releases/download/${TAG}"
          sha() { grep "aic_${VERSION}_$1.tar.gz" dist/checksums.txt | awk '{print $1}'; }
          DA="$(sha darwin_amd64)"; DR="$(sha darwin_arm64)"
          LA="$(sha linux_amd64)";  LR="$(sha linux_arm64)"

          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/x-mesh/homebrew-tap.git" tap

          cat > tap/Formula/aic.rb <<RUBY
          # typed: false
          # frozen_string_literal: true

          # This file is generated by aic's release workflow. DO NOT EDIT.
          class Aic < Formula
            desc "Shell command error analyzer with LLM (PTY wrapper + supervisor daemon)"
            homepage "https://github.com/x-mesh/aic"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "${base}/aic_${VERSION}_darwin_amd64.tar.gz"
                sha256 "${DA}"

                def install
                  bin.install "aic"
                  bin.install "aic-session"
                  bin.install "aicd"
                end
              end
              if Hardware::CPU.arm?
                url "${base}/aic_${VERSION}_darwin_arm64.tar.gz"
                sha256 "${DR}"

                def install
                  bin.install "aic"
                  bin.install "aic-session"
                  bin.install "aicd"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "${base}/aic_${VERSION}_linux_amd64.tar.gz"
                sha256 "${LA}"

                def install
                  bin.install "aic"
                  bin.install "aic-session"
                  bin.install "aicd"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "${base}/aic_${VERSION}_linux_arm64.tar.gz"
                sha256 "${LR}"

                def install
                  bin.install "aic"
                  bin.install "aic-session"
                  bin.install "aicd"
                end
              end
            end

            def caveats
              <<~EOS
                To run aicd in the background and on login:

                  aic daemon install        # writes the right unit for your OS

                First-time setup:
                  aic config                # interactive provider/api_key/model wizard
                  aic init zsh              # add 'source ~/.aic/hooks.zsh' to your rc
              EOS
            end

            test do
              system "#{bin}/aic", "--version"
              system "#{bin}/aic-session", "--version"
              system "#{bin}/aicd", "--version"
            end
          end
          RUBY

          cd tap
          git config user.name "aic-bot"
          git config user.email "bot@x-mesh.dev"
          git add Formula/aic.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged"
          else
            git commit -m "aic ${VERSION}"
            git push
          fi
