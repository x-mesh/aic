name: release

# `v*` 태그 push 시 GoReleaser가 multi-arch binary 빌드 + GitHub Release +
# x-mesh/homebrew-tap Formula 자동 갱신까지 한 번에 처리한다.
# x-mesh/gk와 같은 패턴 — secret 이름(`HOMEBREW_TAP_GITHUB_TOKEN`)도 동일.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # GitHub Release 생성

jobs:
  goreleaser:
    # macos-latest로 결정한 이유:
    #   aic-client → keyring → security-framework가 macOS Security/CoreFoundation
    #   framework에 link한다. ubuntu runner에서 zigbuild로 darwin cross-compile
    #   시도 시 SDK framework를 못 찾아 link 단계에서 실패한다 (run 24985180591).
    #   macos runner는 darwin을 native 빌드하고, linux 두 target은 zigbuild로
    #   cross-compile한다 — 한 runner로 4 target 안전 처리.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tag 메타데이터 + 전체 git log (changelog 추출용)

      # Rust toolchain + cross 컴파일 대상 4개.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      # zig + cargo-zigbuild — linux 두 target을 cross-compile.
      # darwin은 native(macOS SDK 자동 발견).
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: |
          # Pin a known-good version. Newer versions sometimes require newer
          # zig releases; bump together when updating.
          cargo install --locked cargo-zigbuild --version 0.20.1 || \
            cargo install --locked cargo-zigbuild

      # Validate config first — fast feedback on .goreleaser.yaml syntax errors.
      # version 고정: `brews`가 GoReleaser v2.16에서 hard-removal 됐다(v2.10 soft-deprecate).
      # `version: latest`가 v2.16.0을 받으면서 `check`가 deprecated 속성으로 exit 2 →
      # release.yml 전체 실패(0.10.0 사례). cask 마이그레이션(brews→homebrew_casks) 전까지
      # brews를 지원하는 마지막 라인인 v2.15에 고정한다.
      - name: GoReleaser check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2.15'
          args: check

      - name: GoReleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2.15'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # x-mesh org-level secret으로 등록되어 있다면 별도 repo secret 등록 불필요.
          # 없으면 fine-grained PAT(scope: contents+pull-requests on
          # x-mesh/homebrew-tap)을 repo secret으로 등록한다 — RELEASING.md 참조.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
