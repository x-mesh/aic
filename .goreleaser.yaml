# GoReleaser config (Rust builder) — pairs with .github/workflows/release.yml.
#
# Mirrors x-mesh/gk's release pipeline so the team uses one toolchain. The
# only Rust-specific bits are `builder: rust` per build and the cargo-zigbuild
# tool for cross-compilation (installed in the workflow).
#
# Three workspace binaries are each built as a separate entry so
# GoReleaser can fan out across the four target triples, then bundled into
# one archive per (os, arch) so a single brew install lays down all three.

version: 2

project_name: aic

before:
  hooks:
    # Pre-fetch the lockfile so each cross-compile job doesn't re-resolve.
    - cargo fetch --locked

builds:
  # workspace에서 cargo는 --manifest-path만으로는 어떤 package인지 결정 못 한다.
  # 첫 release 시도에서 다음 에러로 실패함:
  #   "you need to specify which workspace to build, please add '--package=[name]'"
  # 따라서 -p <crate> + --bin <name> 두 인자를 함께 명시한다.
  # Release artifact 는 Phase 3.4 빌드만 배포한다 (R18.3).
  # `aic-common/build.rs` 가 정확히 하나의 phase-3_N feature 만 활성임을 assert
  # 하기 때문에, workspace default (phase-3_1) 를 끄고 phase-3_4 를 명시적으로
  # 켜야 빌드가 성립한다. Phase 3.4 = Local Processing 제거 + Central Store
  # 기본 활성 (R6, R19) 가 릴리스 기본이다.
  #
  # **OS별로 tool을 나눈다** (v0.27.0 GoReleaser 3연속 실패의 원인 수정):
  #   - linux 2 target → cargo-zigbuild (ubuntu SDK 없이 zig로 cross-compile).
  #   - darwin 2 target → cargo (native). macos-latest runner의 Apple SDK가
  #     프레임워크를 링크한다. aic-server가 sysinfo(IOKit/CoreFoundation) +
  #     keyring(Security)을 쓰게 된 v0.27.0부터, zigbuild darwin은 이 프레임워크
  #     심볼을 못 찾아 `undefined symbol: _IOBSDNameMatching`/`_SecKeychain*` 등으로
  #     link 단계에서 죽었다(zig 링커는 Apple SDK framework를 모른다). native cargo는
  #     runner의 실제 macOS SDK로 링크해 이 심볼들을 해소한다. build entry는 target이
  #     아니라 entry 단위로 tool을 갖기 때문에, 같은 binary를 linux/darwin 두 entry로
  #     쪼갠다(3 binary × 2 OS = 6 entry). archive는 (os,arch)로 다시 묶는다.
  - id: aic-cli-linux
    builder: rust
    binary: aic
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    tool: cargo-zigbuild
    flags:
      - --release
      - --package=aic-client
      - --bin=aic
      - --no-default-features
      - --features=phase-3_4
  - id: aic-cli-darwin
    builder: rust
    binary: aic
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin
    tool: cargo
    flags:
      - --release
      - --package=aic-client
      - --bin=aic
      - --no-default-features
      - --features=phase-3_4

  - id: aic-session-linux
    builder: rust
    binary: aic-session
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    tool: cargo-zigbuild
    flags:
      - --release
      - --package=aic-server
      - --bin=aic-session
      - --no-default-features
      - --features=phase-3_4
  - id: aic-session-darwin
    builder: rust
    binary: aic-session
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin
    tool: cargo
    flags:
      - --release
      - --package=aic-server
      - --bin=aic-session
      - --no-default-features
      - --features=phase-3_4

  - id: aicd-linux
    builder: rust
    binary: aicd
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    tool: cargo-zigbuild
    flags:
      - --release
      - --package=aic-server
      - --bin=aicd
      - --no-default-features
      - --features=phase-3_4
  - id: aicd-darwin
    builder: rust
    binary: aicd
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin
    tool: cargo
    flags:
      - --release
      - --package=aic-server
      - --bin=aicd
      - --no-default-features
      - --features=phase-3_4

archives:
  - id: aic-archive
    # 한 tar.gz에 세 binary를 모두 담아 brew install이 한 번에 끝나게 한다.
    # linux/darwin으로 쪼갠 6 entry를 모두 넣으면 GoReleaser가 (os,arch)로 매칭해
    # 아카이브당 세 binary를 묶는다.
    ids:
      - aic-cli-linux
      - aic-cli-darwin
      - aic-session-linux
      - aic-session-darwin
      - aicd-linux
      - aicd-darwin
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# release.mode = replace
# 기본값(`append`)은 같은 이름 asset이 이미 있으면 422 already_exists로 실패한다.
# rerun이나 부분 실패 후 재실행 시 매번 release를 손으로 지우는 부담이 생긴다.
# `replace`는 conflict 시 기존 asset을 삭제 후 새로 업로드 — 멱등 release 보장.
release:
  mode: replace

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  # GoReleaser가 git log에서 자동 생성. 조용한 carve-out 패턴은 gk와 동일.
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

brews:
  - name: aic
    repository:
      owner: x-mesh
      name: homebrew-tap
      branch: main
      # gk와 같은 secret 이름 — org-level이면 등록 불필요.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/x-mesh/aic
    description: "Shell command error analyzer with LLM (PTY wrapper + supervisor daemon)"
    license: MIT
    commit_author:
      name: aic-bot
      email: bot@x-mesh.dev
    install: |
      bin.install "aic"
      bin.install "aic-session"
      bin.install "aicd"
    test: |
      system "#{bin}/aic", "--version"
      system "#{bin}/aic-session", "--version"
      system "#{bin}/aicd", "--version"
    caveats: |
      To run aicd in the background and on login:

        aic daemon install        # writes the right unit for your OS

      What this does:
        macOS  -> ~/Library/LaunchAgents/com.x-mesh.aicd.plist (launchctl)
        Linux  -> ~/.config/systemd/user/aicd.service (systemctl --user)

      First-time setup:
        aic config                # interactive provider/api_key/model wizard
        aic init zsh              # add 'source ~/.aic/hooks.zsh' to your rc
